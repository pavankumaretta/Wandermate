services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - wandermate_mongo:/data/db

  api:
    build: ./backend
    environment:
      PORT: "4000"
      MONGODB_URI: mongodb://mongo:27017/wandermate
      CLIENT_ORIGIN: http://localhost:5174
      AUTH_MODE: development
      PUBLIC_API_KEY: wandermate-demo-key
    ports:
      - "4000:4000"
    depends_on:
      - mongo

  web:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:4000
        VITE_SOCKET_URL: http://localhost:4000
    ports:
      - "5174:80"
    depends_on:
      - api

volumes:
  wandermate_mongo:
